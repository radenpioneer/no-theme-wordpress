version: "3"

services:
  db:
    container_name: db
    image: mariadb:10.11.9@sha256:5c2a279eacfa00bd4453b10569e36d8ee24331cdc09273df70c4dbd383c277b4
    volumes:
      - db_data:/var/lib/mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_USER: wordpress
      MYSQL_PASSWORD: wordpress
      MYSQL_DATABASE: wordpress
    networks:
      - wordpress-net

  wordpress:
    depends_on:
      - db
    container_name: wordpress
    build: .
    volumes:
      - wordpress_data:/var/www/html
      - ..:/var/www/html/wp-content/themes/no-theme
    restart: unless-stopped
    environment:
      WORDPRESS_DB_HOST: db:3306
      WORDPRESS_DB_USER: wordpress
      WORDPRESS_DB_PASSWORD: wordpress
      WORDPRESS_DB_NAME: wordpress
      WORDPRESS_CONFIG_EXTRA: |
        define('WP_DEFAULT_THEME', 'no-theme');
    networks:
      - wordpress-net

  nginx:
    depends_on:
      - wordpress
    image: nginx:1.27.0-alpine@sha256:208b70eefac13ee9be00e486f79c695b15cef861c680527171a27d253d834be9
    container_name: nginx
    restart: unless-stopped
    ports:
      - 8080:80
    volumes:
      - wordpress_data:/var/www/html
      - ./nginx:/etc/nginx/conf.d
    networks:
      - wordpress-net

networks:
  wordpress-net:
    driver: bridge

volumes:
  db_data:
  wordpress_data:
